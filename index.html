<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>my-app</title>
    <!-- Initialize theme early to avoid flash-of-incorrect-theme -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          var shouldDark = theme === 'dark' || (!theme && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (shouldDark) {
            document.documentElement.classList.add('dark');
            document.body && document.body.classList.add('dark');
            document.documentElement.setAttribute('data-theme', 'dark');
            document.body && document.body.setAttribute('data-theme', 'dark');
          } else {
            document.documentElement.classList.remove('dark');
            document.body && document.body.classList.remove('dark');
            document.documentElement.setAttribute('data-theme', 'light');
            document.body && document.body.setAttribute('data-theme', 'light');
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
